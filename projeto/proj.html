<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioFit - Calculadora de Composição Corporal</title>
    <style>
        :root {
            --primary: #0ea5e9;
            --secondary: #64748b;
            --accent: #06b6d4;
            --dark: #0f172a;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Imagem de fundo Fitness */
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            border-top: 5px solid var(--primary);
        }

        h2 { 
            color: var(--dark); 
            text-align: center; 
            margin-top: 0;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group { margin-bottom: 1.2rem; }

        label { 
            display: block; 
            font-size: 0.85rem; 
            font-weight: 700; 
            color: var(--dark); 
            margin-bottom: 0.4rem;
            text-transform: uppercase;
        }

        select, input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.4);
        }

        #resultado {
            margin-top: 1.5rem;
            padding: 1.2rem;
            border-radius: 12px;
            background: var(--dark);
            color: white;
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .res-item { 
            display: flex; 
            justify-content: space-between; 
            margin: 0.6rem 0; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.4rem;
        }

        .res-val { font-weight: bold; color: var(--primary); font-size: 1.1rem; }
        
        .info-dobras { 
            background: #f1f5f9;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.75rem; 
            color: var(--secondary); 
            margin-bottom: 1rem; 
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>BioFit Calc</h2>
    
    <div class="form-group">
        <label>Perfil</label>
        <select id="sexo" onchange="atualizarInterface()">
            <option value="M">Masculino (Peito/Abd/Coxa)</option>
            <option value="F">Feminino (Tríc/Supra/Coxa)</option>
        </select>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="form-group">
            <label>Idade</label>
            <input type="number" id="idade" placeholder="Anos">
        </div>
        <div class="form-group">
            <label>Peso (kg)</label>
            <input type="number" id="peso" placeholder="00.0">
        </div>
    </div>

    <div class="info-dobras" id="msg-dobras">Use o adipômetro nas dobras indicadas</div>

    <div class="form-group">
        <label id="lbl1">Peitoral (mm)</label>
        <input type="number" id="d1" step="0.1">
    </div>
    <div class="form-group">
        <label id="lbl2">Abdômen (mm)</label>
        <input type="number" id="d2" step="0.1">
    </div>
    <div class="form-group">
        <label id="lbl3">Coxa (mm)</label>
        <input type="number" id="d3" step="0.1">
    </div>

    <button onclick="calcular()">Calcular Agora</button>

    <div id="resultado">
        <div class="res-item"><span>% de Gordura:</span> <span class="res-val" id="res-perc">--</span></div>
        <div class="res-item"><span>Massa Gorda:</span> <span class="res-val" id="res-gorda">--</span></div>
        <div class="res-item"><span>Massa Magra:</span> <span class="res-val" id="res-magra">--</span></div>
    </div>
</div>

<script>
    function atualizarInterface() {
        const sexo = document.getElementById('sexo').value;
        const lbl1 = document.getElementById('lbl1');
        const lbl2 = document.getElementById('lbl2');
        const lbl3 = document.getElementById('lbl3');

        if (sexo === 'M') {
            lbl1.innerText = "Peitoral (mm)";
            lbl2.innerText = "Abdômen (mm)";
        } else {
            lbl1.innerText = "Tríceps (mm)";
            lbl2.innerText = "Suprailíaca (mm)";
        }
        // Coxa é igual para ambos no protocolo de 3 dobras
        lbl3.innerText = "Coxa (mm)";
    }

    function calcular() {
        const sexo = document.getElementById('sexo').value;
        const idade = parseFloat(document.getElementById('idade').value);
        const peso = parseFloat(document.getElementById('peso').value);
        const d1 = parseFloat(document.getElementById('d1').value);
        const d2 = parseFloat(document.getElementById('d2').value);
        const d3 = parseFloat(document.getElementById('d3').value);

        if (!idade || !peso || isNaN(d1) || isNaN(d2) || isNaN(d3)) {
            alert("Por favor, preencha todos os campos para o cálculo.");
            return;
        }

        const soma = d1 + d2 + d3;
        let densidade;

        if (sexo === 'M') {
            densidade = 1.10938 - (0.0008267 * soma) + (0.0000016 * Math.pow(soma, 2)) - (0.0002574 * idade);
        } else {
            densidade = 1.0994921 - (0.0009929 * soma) + (0.0000023 * Math.pow(soma, 2)) - (0.0001392 * idade);
        }

        const bf = ((4.95 / densidade) - 4.50) * 100;
        const mg = (peso * bf) / 100;
        const mm = peso - mg;

        document.getElementById('res-perc').innerText = bf.toFixed(1) + "%";
        document.getElementById('res-gorda').innerText = mg.toFixed(1) + " kg";
        document.getElementById('res-magra').innerText = mm.toFixed(1) + " kg";
        document.getElementById('resultado').style.display = 'block';
    }
</script>

</body>
</html>
