<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioFit Pro - Oficial</title>
    <!-- Bibliotecas externas -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --primary: #0ea5e9; --accent: #06b6d4; --dark: #0f172a; }
        body {
            font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), 
                        url('https://images.unsplash.com');
            background-size: cover; background-position: center;
        }
        .container {
            background: #ffffff; padding: 2rem; border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); width: 90%; max-width: 400px;
        }
        h2 { color: var(--dark); text-align: center; margin-bottom: 1.5rem; font-size: 1.5rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
        label { display: block; font-size: 0.7rem; font-weight: bold; color: #475569; margin-bottom: 4px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        #resultado { margin-top: 1.5rem; display: none; text-align: center; border-top: 2px solid #f1f5f9; padding-top: 1rem; }
        /* Garante que o canvas tenha um tamanho fixo visível */
        .chart-box { position: relative; height: 200px; width: 200px; margin: 0 auto 15px auto; }
        .res-text { font-size: 0.9rem; margin-bottom: 10px; color: #334155; }
        .res-text b { color: var(--primary); font-size: 1.1rem; }
        #status-box { padding: 10px; border-radius: 8px; font-weight: bold; color: white; margin-top: 10px; text-transform: uppercase; }
        .btn-pdf { background: #22c55e; margin-top: 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container" id="app">
    <h2>BIOFIT PRO</h2>
    
    <div class="form-row">
        <div><label>Sexo</label><select id="sexo" onchange="atualizarLabels()"><option value="M">Masc.</option><option value="F">Fem.</option></select></div>
        <div><label>Idade</label><input type="number" id="idade" placeholder="25"></div>
    </div>
    <div class="form-row">
        <div><label>Peso (kg)</label><input type="number" id="peso" step="0.1" placeholder="80"></div>
        <div><label id="lbl1">Peito (mm)</label><input type="number" id="d1" step="0.1"></div>
    </div>
    <div class="form-row">
        <div><label id="lbl2">Barriga (mm)</label><input type="number" id="d2" step="0.1"></div>
        <div><label id="lbl3">Coxa (mm)</label><input type="number" id="d3" step="0.1"></div>
    </div>

    <button onclick="calcular()">Calcular Resultado</button>

    <div id="resultado">
        <div class="chart-box">
            <canvas id="meuGrafico"></canvas>
        </div>
        <div class="res-text">Percentual: <b id="res-perc">0%</b></div>
        <div class="res-text">M. Magra: <b id="res-magra">0kg</b> | M. Gorda: <b id="res-gorda">0kg</b></div>
        <div id="status-box"></div>
        <button class="btn-pdf" onclick="gerarPDF()">Baixar Relatório PDF</button>
    </div>
</div>

<script>
    let chartInstance = null;

    function atualizarLabels() {
        const s = document.getElementById('sexo').value;
        document.getElementById('lbl1').innerText = s === 'M' ? "Peito (mm)" : "Braço (atrás)";
        document.getElementById('lbl2').innerText = s === 'M' ? "Barriga (mm)" : "Cintura (lat)";
    }

    function calcular() {
        const sexo = document.getElementById('sexo').value;
        const idade = parseFloat(document.getElementById('idade').value);
        const peso = parseFloat(document.getElementById('peso').value);
        const d1 = parseFloat(document.getElementById('d1').value);
        const d2 = parseFloat(document.getElementById('d2').value);
        const d3 = parseFloat(document.getElementById('d3').value);

        if (!idade || !peso || isNaN(d1) || isNaN(d2) || isNaN(d3)) {
            alert("Preencha todos os campos!");
            return;
        }

        const soma = d1 + d2 + d3;
        let d;
        if (sexo === 'M') {
            d = 1.10938 - (0.0008267 * soma) + (0.0000016 * soma * soma) - (0.0002574 * idade);
        } else {
            d = 1.0994921 - (0.0009929 * soma) + (0.0000023 * soma * soma) - (0.0001392 * idade);
        }

        const bf = ((4.95 / d) - 4.50) * 100;
        const mg = (peso * bf) / 100;
        const mm = peso - mg;

        document.getElementById('res-perc').innerText = bf.toFixed(1) + "%";
        document.getElementById('res-magra').innerText = mm.toFixed(1) + "kg";
        document.getElementById('res-gorda').innerText = mg.toFixed(1) + "kg";

        const statusBox = document.getElementById('status-box');
        const ideal = sexo === 'M' ? 18 : 25;
        statusBox.innerText = bf < ideal ? "Bom / Excelente" : "Acima do Ideal";
        statusBox.style.backgroundColor = bf < ideal ? "#22c55e" : "#ef4444";

        document.getElementById('resultado').style.display = 'block';

        // Renderizar o gráfico com pequeno delay para garantir que o elemento esteja visível
        setTimeout(() => {
            renderizarGrafico(mm, mg);
        }, 100);
    }

    function renderizarGrafico(magra, gorda) {
        const ctx = document.getElementById('meuGrafico').getContext('2d');
        
        if (chartInstance) {
            chartInstance.destroy();
        }

        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Massa Magra', 'Massa Gorda'],
                datasets: [{
                    data: [magra.toFixed(1), gorda.toFixed(1)],
                    backgroundColor: ['#0ea5e9', '#e2e8f0'],
                    hoverOffset: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });
    }

    function gerarPDF() {
        const element = document.getElementById('app');
        html2pdf().from(element).save('resultado_fitness.pdf');
    }
</script>
</body>
</html>
