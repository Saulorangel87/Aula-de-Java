<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioFit Pro - Teste de Gráfico</title>
    
    <!-- Carregamento Prioritário das Bibliotecas -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdnjs.cloudflare.com"></script>

    <style>
        :root { --primary: #0ea5e9; --dark: #0f172a; }
        body { font-family: sans-serif; background: var(--dark); color: white; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; color: #333; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #resultado { margin-top: 20px; display: none; border-top: 2px solid #eee; padding-top: 20px; text-align: center; }
        /* Box do gráfico com borda para teste visual */
        .chart-box { width: 200px; height: 200px; margin: 0 auto; position: relative; border: 1px dashed #ddd; }
        .btn-pdf { background: #22c55e; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container" id="app">
    <h2>BioFit Pro</h2>
    
    <label>Peso (kg)</label>
    <input type="number" id="peso" placeholder="Ex: 80">
    
    <label>Altura (cm)</label>
    <input type="number" id="altura" placeholder="Ex: 175">

    <label>Soma das 3 Dobras (mm)</label>
    <input type="number" id="soma" placeholder="Ex: 45">
    <small style="display:block; margin-bottom:15px; color:#666;">(Some os 3 valores do adipômetro e coloque aqui)</small>

    <button onclick="calcularRapido()">Calcular Agora</button>

    <div id="resultado">
        <div class="chart-box">
            <canvas id="meuGrafico"></canvas>
        </div>
        <p>Gordura: <b id="res-perc">0%</b></p>
        <button class="btn-pdf" onclick="gerarPDF()">Baixar PDF</button>
    </div>
</div>

<script>
    let chartInstance = null;

    function calcularRapido() {
        const peso = parseFloat(document.getElementById('peso').value);
        const soma = parseFloat(document.getElementById('soma').value);
        const altura = parseFloat(document.getElementById('altura').value);

        if (!peso || !soma || !altura) {
            alert("Preencha os campos de teste!");
            return;
        }

        // Cálculo simplificado para teste de renderização
        const bf = (soma * 0.25).toFixed(1); 
        const mg = (peso * bf / 100).toFixed(1);
        const mm = (peso - mg).toFixed(1);

        document.getElementById('res-perc').innerText = bf + "%";
        document.getElementById('resultado').style.display = 'block';

        // Tenta desenhar o gráfico
        setTimeout(() => {
            const ctx = document.getElementById('meuGrafico').getContext('2d');
            
            if (chartInstance) chartInstance.destroy();

            try {
                chartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Magra', 'Gorda'],
                        datasets: [{
                            data: [mm, mg],
                            backgroundColor: ['#0ea5e9', '#e2e8f0']
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
                console.log("Gráfico criado com sucesso!");
            } catch (e) {
                console.error("Erro ao carregar Chart.js:", e);
                alert("Erro técnico: O motor do gráfico não carregou. Verifique sua internet.");
            }
        }, 200);
    }

    function gerarPDF() {
        const element = document.getElementById('app');
        html2pdf().from(element).save('Teste_BioFit.pdf');
    }
</script>
</body>
</html>
