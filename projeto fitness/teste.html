<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioFit Pro - Calculadora de Gordura Corporal</title>
    
    <!-- Bibliotecas CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.12.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { 
            --primary: #0ea5e9; 
            --accent: #06b6d4; 
            --dark: #0f172a; 
            --success: #10b981;
            --danger: #ef4444;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif; 
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 1rem;
            background: linear-gradient(rgba(15, 23, 42, 0.75 ), rgba(15, 23, 42, 0.75)), 
                        linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 2rem; 
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); 
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 { 
            color: var(--dark); 
            text-align: center; 
            margin-bottom: 1.5rem; 
            font-size: 1.5rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        .form-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 1rem; 
        }

        label { 
            display: block; 
            font-size: 0.75rem; 
            font-weight: 700; 
            color: #475569; 
            margin-bottom: 4px; 
            text-transform: uppercase; 
        }

        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #cbd5e1; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background: white;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        button { 
            width: 100%; 
            background: linear-gradient(135deg, var(--primary), var(--accent)); 
            color: white; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 16px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        #resultado { 
            margin-top: 1.5rem; 
            display: none; 
            text-align: center; 
            border-top: 2px solid #e2e8f0; 
            padding-top: 1.5rem; 
        }

        .chart-box { 
            position: relative; 
            height: 200px; 
            width: 200px; 
            margin: 0 auto 20px auto; 
        }

        #status-box { 
            padding: 12px; 
            border-radius: 8px; 
            font-weight: bold; 
            color: white; 
            margin-top: 15px; 
            text-transform: uppercase; 
            font-size: 0.9rem; 
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
            font-size: 0.9rem;
            color: #334155;
        }

        .result-item {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .result-item b {
            color: var(--dark);
            font-size: 1.1rem;
        }

        .btn-pdf { 
            background: var(--success); 
            margin-top: 15px; 
        }

        .btn-pdf:hover {
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .alert {
            background: #fee2e2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 1rem;
            color: #991b1b;
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }

            h2 {
                font-size: 1.25rem;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <h2>BIOFIT PRO</h2>
    
    <form id="formulario" onsubmit="calcular(event)">
        <div id="alertas"></div>

        <div class="form-row">
            <div>
                <label for="sexo">Sexo</label>
                <select id="sexo" onchange="atualizarLabels()" required>
                    <option value="M">Masculino</option>
                    <option value="F">Feminino</option>
                </select>
            </div>
            <div>
                <label for="idade">Idade (anos)</label>
                <input type="number" id="idade" placeholder="25" min="18" max="100" required>
            </div>
        </div>

        <div class="form-row">
            <div>
                <label for="altura">Altura (cm)</label>
                <input type="number" id="altura" placeholder="175" min="100" max="250" step="0.1" required>
            </div>
            <div>
                <label for="peso">Peso (kg)</label>
                <input type="number" id="peso" placeholder="80.0" min="30" max="300" step="0.1" required>
            </div>
        </div>

        <div class="form-row">
            <div>
                <label id="lbl1" for="d1">Peito (mm)</label>
                <input type="number" id="d1" placeholder="0.0" min="0" max="200" step="0.1" required>
            </div>
            <div>
                <label id="lbl2" for="d2">Abdômen (mm)</label>
                <input type="number" id="d2" placeholder="0.0" min="0" max="200" step="0.1" required>
            </div>
        </div>

        <div class="form-row">
            <div>
                <label id="lbl3" for="d3">Coxa (mm)</label>
                <input type="number" id="d3" placeholder="0.0" min="0" max="200" step="0.1" required>
            </div>
        </div>

        <button type="submit">Calcular Agora</button>
    </form>

    <div id="resultado">
        <div class="chart-box"><canvas id="meuGrafico"></canvas></div>
        
        <div class="results-grid">
            <div class="result-item">
                <div>Gordura Corporal</div>
                <b id="res-perc">0%</b>
            </div>
            <div class="result-item">
                <div>IMC</div>
                <b id="res-imc">0</b>
            </div>
            <div class="result-item">
                <div>Massa Magra</div>
                <b id="res-magra">0kg</b>
            </div>
            <div class="result-item">
                <div>Massa Gorda</div>
                <b id="res-gorda">0kg</b>
            </div>
        </div>

        <div id="status-box"></div>
        <button type="button" class="btn-pdf" id="btnPdf" onclick="gerarPDF()">📥 Gerar PDF</button>
    </div>
</div>

<script>
    let chartInstance = null;

    function atualizarLabels() {
        const s = document.getElementById('sexo').value;
        document.getElementById('lbl1').innerText = s === 'M' ? "Peito (mm)" : "Tríceps (mm)";
        document.getElementById('lbl2').innerText = s === 'M' ? "Abdômen (mm)" : "Supra-ilíaca (mm)";
        document.getElementById('lbl3').innerText = s === 'M' ? "Coxa (mm)" : "Coxa (mm)";
    }

    function validarEntradas(idade, altura, peso, d1, d2, d3) {
        const erros = [];
        
        if (!idade || idade < 18 || idade > 100) {
            erros.push("Idade deve estar entre 18 e 100 anos");
        }
        if (!altura || altura < 100 || altura > 250) {
            erros.push("Altura deve estar entre 100 e 250 cm");
        }
        if (!peso || peso < 30 || peso > 300) {
            erros.push("Peso deve estar entre 30 e 300 kg");
        }
        if (isNaN(d1) || d1 < 0 || d1 > 200) {
            erros.push("Dobra 1 deve estar entre 0 e 200 mm");
        }
        if (isNaN(d2) || d2 < 0 || d2 > 200) {
            erros.push("Dobra 2 deve estar entre 0 e 200 mm");
        }
        if (isNaN(d3) || d3 < 0 || d3 > 200) {
            erros.push("Dobra 3 deve estar entre 0 e 200 mm");
        }

        return erros;
    }

    function calcularDensidade(sexo, idade, soma) {
        let densidade;
        
        if (sexo === 'M') {
            densidade = 1.10938 - (0.0008267 * soma) + (0.0000016 * soma * soma) - (0.0002574 * idade);
        } else {
            densidade = 1.0994921 - (0.0009929 * soma) + (0.0000023 * soma * soma) - (0.0001392 * idade);
        }
        
        return densidade;
    }

    function calcularPercentualGordura(densidade) {
        return ((4.95 / densidade) - 4.5) * 100;
    }

    function calcular(event) {
        event.preventDefault();

        const sexo = document.getElementById('sexo').value;
        const idade = parseFloat(document.getElementById('idade').value);
        const altura = parseFloat(document.getElementById('altura').value);
        const peso = parseFloat(document.getElementById('peso').value);
        const d1 = parseFloat(document.getElementById('d1').value);
        const d2 = parseFloat(document.getElementById('d2').value);
        const d3 = parseFloat(document.getElementById('d3').value);

        document.getElementById('alertas').innerHTML = '';

        const erros = validarEntradas(idade, altura, peso, d1, d2, d3);
        if (erros.length > 0) {
            const alertaDiv = document.createElement('div');
            alertaDiv.className = 'alert';
            alertaDiv.innerHTML = '<strong>Erro na validação:</strong> ' + erros.join('<br>');
            document.getElementById('alertas').appendChild(alertaDiv);
            return;
        }

        const imc = peso / ((altura / 100) ** 2);
        const soma = d1 + d2 + d3;
        const densidade = calcularDensidade(sexo, idade, soma);
        const bf = calcularPercentualGordura(densidade);
        
        if (bf < 0 || bf > 100) {
            const alertaDiv = document.createElement('div');
            alertaDiv.className = 'alert';
            alertaDiv.innerHTML = '<strong>Erro no cálculo:</strong> Percentual de gordura inválido. Verifique as medidas das dobras.';
            document.getElementById('alertas').appendChild(alertaDiv);
            return;
        }

        const mg = (peso * bf) / 100;
        const mm = peso - mg;

        document.getElementById('res-perc').innerText = bf.toFixed(1) + "%";
        document.getElementById('res-imc').innerText = imc.toFixed(1);
        document.getElementById('res-magra').innerText = mm.toFixed(1) + "kg";
        document.getElementById('res-gorda').innerText = mg.toFixed(1) + "kg";
        
        const box = document.getElementById('status-box');
        let status, cor;
        
        if (sexo === 'M') {
            if (bf < 10) {
                status = "Muito Baixo";
                cor = "#3b82f6";
            } else if (bf < 18) {
                status = "Excelente";
                cor = "#10b981";
            } else if (bf < 25) {
                status = "Bom";
                cor = "#8b5cf6";
            } else if (bf < 32) {
                status = "Acima do Ideal";
                cor = "#f59e0b";
            } else {
                status = "Alto";
                cor = "#ef4444";
            }
        } else {
            if (bf < 18) {
                status = "Muito Baixo";
                cor = "#3b82f6";
            } else if (bf < 25) {
                status = "Excelente";
                cor = "#10b981";
            } else if (bf < 32) {
                status = "Bom";
                cor = "#8b5cf6";
            } else if (bf < 39) {
                status = "Acima do Ideal";
                cor = "#f59e0b";
            } else {
                status = "Alto";
                cor = "#ef4444";
            }
        }

        box.innerText = status;
        box.style.backgroundColor = cor;
        document.getElementById('resultado').style.display = 'block';

        setTimeout(() => {
            const ctx = document.getElementById('meuGrafico').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: { 
                    labels: ['Massa Magra', 'Massa Gorda'],
                    datasets: [{ 
                        data: [parseFloat(mm.toFixed(1)), parseFloat(mg.toFixed(1))], 
                        backgroundColor: ['#0ea5e9', '#e2e8f0'],
                        borderColor: ['#0284c7', '#cbd5e1'],
                        borderWidth: 2
                    }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                font: { size: 12 },
                                padding: 15
                            }
                        }
                    }
                }
            });
        }, 200);
    }

    function gerarPDF() {
        const element = document.getElementById('app');
        const opt = {
            margin: 10,
            filename: 'Avaliacao_BioFit_Pro.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
        };
        html2pdf().set(opt).from(element).save();
    }

    window.addEventListener('load', atualizarLabels);
</script>
</body>
</html>
