<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificando sua nacionalidade</title>
</head>
<body>
    <h1>Verificando sua nacionalidade</h1>
    Digite o nome do seu país: <input type="text" id="countryInput">
    <button onclick="verificarNacionalidade()"
    >Verificar</button>
    <style>        body {
            font-family: Arial, sans-serif;
            background-color: #7ba0ee;
            padding: 20px;
            text-align: center;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
            color: #ddd318;
                background-color: #2b7521;
                border: none;
                border-radius: 4px;
                cursor: pointer;
        }
    </style>
    <style>
        h1 {
            color: #d01313; background-color: #ddd318; padding: 10px; border-radius: 200px;
            color: #000;
            width: fit-content;
            margin: 20px auto;;
        }
    </style>
    <style>
        #countryInput {
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 5px;
            font-size: 16px;
            cursor: pointer;
            color: #111010;
        }
        #resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
    <div id="resultado"></div>

    <script>
        function verificarNacionalidade() {
            var country = document.getElementById('countryInput').value;
            var resultado = document.getElementById('resultado');

            if (country == 'Brasil') {
                resultado.innerHTML = 'Você é Brasileiro!';
            } else {
                resultado.innerHTML = 'Você é Estrangeiro!';
            }
        }
    </script>

</body>
</html>
